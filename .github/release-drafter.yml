name-template: '$RESOLVED_VERSION'
tag-template: '$RESOLVED_VERSION'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&' # You can add # and @ to disable mentions, and add ` to disable code blocks.
version-resolver:
  default: minor
template: |
  ## What's new since $PREVIOUS_TAG

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...$RESOLVED_VERSION

  $CONTRIBUTORS

  ---

  ## Release assets

  | File | Description |
  |------|-------------|
  | `Prompty.php` | Full class with comments |
  | `Prompty.min.php` | Minified — comments stripped, single line |
  | `Prompty.compact.php` | Compacted — minified + shortened internals (~60% smaller) |
  | `starter.php` | Example script template |
  | `embed.php` | Embed/minify helper |

  ## Verifying release assets

  Download the asset files, `SHA256SUMS`, and `SHA256SUMS.asc` into the same
  directory, then:

  ```bash
  # Import the public key (first time only).
  curl -sL https://raw.githubusercontent.com/AlexSkrypnyk/prompty/main/PUBLIC_KEY.asc | gpg --import

  # Verify the signature.
  gpg --verify SHA256SUMS.asc SHA256SUMS

  # Verify file checksums.
  sha256sum -c SHA256SUMS
  ```
